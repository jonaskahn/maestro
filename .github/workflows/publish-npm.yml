name: Publish to npm

on:
  workflow_dispatch:

jobs:
  publish:
    name: Publish latest tag to npm
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3
        with:
          fetch-depth: 0

      - name: Resolve latest tag
        id: tag
        run: |
          LATEST_TAG=$(git tag -l --sort=-v:refname | head -n 1)
          if [ -z "$LATEST_TAG" ]; then
            echo "No git tags found. Create a tag before publishing."
            exit 1
          fi
          echo "tag=$LATEST_TAG" >> "$GITHUB_OUTPUT"
          echo "Publishing tag: $LATEST_TAG"

      - name: Checkout latest tag
        run: git checkout "${{ steps.tag.outputs.tag }}"

      - name: Use Node.js
        uses: actions/setup-node@v3
        with:
          node-version: "18.x"
          registry-url: "https://registry.npmjs.org"

      - name: Install dependencies
        run: npm install

      - name: Run checks and tests
        run: npm run code:check && npm test

      - name: Publish to npm
        run: npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
